aid: mono-co
url: https://raw.githubusercontent.com/api-evangelist/mono-co/refs/heads/main/apis.yml
name: Mono
kind: company
description: Mono is an African open-banking platform that lets businesses access bank
  and financial data and collect recurring payments through a single API. The Mono
  REST API at api.withmono.com covers account linking (Connect), transactions, statements,
  identity, income, and balance, plus DirectPay one-time payments and Direct Debit
  mandates, secured with a mono-sec-key header.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Open Banking
- Financial Data
- Payments
- Direct Debit
- Africa
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
